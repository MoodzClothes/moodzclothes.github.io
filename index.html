<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Moodz Clothes</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(90deg, #000, #111);
    }

    h1 {
      font-size: 48px;
      letter-spacing: 4px;
      margin: 0;
    }

    .tagline {
      color: #aaa;
      margin-top: 10px;
      font-size: 14px;
    }

    .section {
      text-align: center;
      padding: 40px 20px;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: #161616;
      padding: 20px;
      width: 220px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #1f1f1f;
    }

    .price {
      color: #00ff99;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ff99;
      color: black;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>MOODZ CLOTHES</h1>
  <p class="tagline">Streetwear • Oversize • Your Mood, Your Style</p>
</header>

<div class="section">
  <h2>🔥 Collection</h2>

  <div class="products">

    <div class="card">
      <h3>Hoodie Oversize</h3>
      <p class="price">29,99€</p>
      <button>Commander</button>
    </div>

    <div class="card">
      <h3>T-Shirt Loose</h3>
      <p class="price">19,99€</p>
      <button>Commander</button>
    </div>

    <div class="card">
      <h3>Baggy Pants</h3>
      <p class="price">34,99€</p>
      <button>Commander</button>
    </div>

  </div>
</div>

<footer>
  © 2026 Moodz Clothes
</footer>

</body>
</html>
