<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Moodz Clothes — Streetwear Oversize</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

:root{
  --bg:#070709;
  --card:#111114;
  --text:#ffffff;
  --muted:#9a9a9a;
  --accent:#00ffcc;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:rgba(7,7,9,.85);
  backdrop-filter:blur(10px);
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

nav .logo{
  font-weight:800;
  letter-spacing:3px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.4),#070709),
    url('https://images.unsplash.com/photo-1552374196-c4e7ffc6e126?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:56px;
  letter-spacing:4px;
  margin:0;
}

.hero p{
  color:var(--muted);
  margin-top:15px;
}

/* PRODUCTS */
.products{
  max-width:1300px;
  margin:auto;
  padding:80px 30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
}

.card{
  background:var(--card);
  border-radius:22px;
  overflow:hidden;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
}

.card .info{
  padding:25px;
}

.card h3{
  margin:0;
  font-weight:600;
}

.price{
  margin:10px 0;
  color:var(--accent);
  font-weight:600;
}

.card a{
  display:block;
  margin-top:20px;
  padding:14px;
  text-align:center;
  background:white;
  color:black;
  text-decoration:none;
  border-radius:12px;
  font-weight:600;
}

/* FOOTER */
footer{
  padding:50px 20px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

footer a{
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<nav>
  <div class="logo">MOODZ</div>
  <div>
    <a href="#shop">SHOP</a>
    <a href="https://instagram.com/moodzclothes" target="_blank">INSTAGRAM</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>MOODZ CLOTHES</h1>
    <p>Oversize • Streetwear • Mood</p>
  </div>
</section>

<section id="shop" class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=900&q=80">
<div class="info">
<h3>Tee-shirt Noir</h3>
<div class="price">19,99€</div>
<a href="tee-noir-simple.html">Voir le produit</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=900&q=80">
<div class="info">
<h3>Tee-shirt Noir Détails</h3>
<div class="price">24,99€</div>
<a href="tee-noir-details.html">Voir le produit</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381294911-8d3cead13475?auto=format&fit=crop&w=900&q=80">
<div class="info">
<h3>Tee-shirt Blanc</h3>
<div class="price">19,99€</div>
<a href="tee-blanc-simple.html">Voir le produit</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=900&q=80">
<div class="info">
<h3>Tee-shirt Blanc Détails</h3>
<div class="price">24,99€</div>
<a href="tee-blanc-details.html">Voir le produit</a>
</div>
</div>

</section>

<footer>
© 2026 Moodz Clothes — <a href="https://instagram.com/moodzclothes">@moodzclothes</a>
</footer>

</body>
</html>
