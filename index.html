<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Moodz Clothes</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    header {
      padding: 40px;
      text-align: center;
      background: black;
    }

    h1 {
      font-size: 40px;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #aaa;
      margin-top: 10px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 40px;
    }

    .card {
      background: #1a1a1a;
      margin: 15px;
      padding: 20px;
      width: 220px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      margin: 10px 0;
      color: #00ff99;
      font-weight: bold;
    }

    button {
      background: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    button:hover {
      background: #00ff99;
      color: black;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>Moodz Clothes</h1>
  <p class="subtitle">Streetwear • Oversize • New Generation</p>
</header>

<div class="container">

  <div class="card">
    <h3>Hoodie Oversize</h3>
    <p class="price">29,99€</p>
    <button>Commander</button>
  </div>

  <div class="card">
    <h3>T-Shirt Loose Fit</h3>
    <p class="price">19,99€</p>
    <button>Commander</button>
  </div>

  <div class="card">
    <h3>Pantalon Baggy</h3>
    <p class="price">34,99€</p>
    <button>Commander</button>
  </div>

</div>

<footer>
  © 2026 Moodz Clothes - Streetwear Brand
</footer>

</body>
</html>
